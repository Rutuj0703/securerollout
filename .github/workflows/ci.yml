name: CI - Build, Scan, Sign

on:
  push:
    branches: [main]
    paths:
      - 'services/analysis-runner/**'

permissions:
  contents: read
  id-token: write

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/analysis-runner
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/analysis-runner:latest

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan image by digest
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            ${{ secrets.DOCKERHUB_USERNAME }}/analysis-runner@${{ steps.build.outputs.digest }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image by digest (keyless)
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/analysis-runner@${{ steps.build.outputs.digest }}

