kind: Deployment
apiVersion: apps/v1
metadata:
  name: mock-check
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-check
  template:
    metadata:
      labels:
        app: mock-check
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo
        args:
          - "-listen=:8080"
          - '-text={"status":"pass"}'
        ports:
          - containerPort: 8080
