kind: Rollout
apiVersion: argoproj.io/v1alpha1
metadata:
  name: demo-rollout
  namespace: demo
spec:
  replicas: 5
  strategy:
    canary:
      steps:
        - setWeight: 20
        - analysis:
            templates:
              - templateName: mock-security-check
            args:
              - name: image-digest
                value: "sha256:placeholder1234567890abcdef"
              - name: namespace
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: pod-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 100
  selector:
    matchLabels:
      app: demo-rollout
  template:
    metadata:
      labels:
        app: demo-rollout
    spec:
      containers:
        - name: demo-rollout
          image: argoproj/rollouts-demo:blue
          ports:
          -  containerPort: 8080
      
