kind: ServiceAccount
apiVersion: v1
metadata:
  name: analysis-runner-sa
  namespace: demo

---

kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: analysis-runner-role
  namespace: demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get","list"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports"]
    verbs: ["get","list"]

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: analysis-runner-binding
  namespace: demo
subjects:
  - kind: ServiceAccount
    name: analysis-runner-sa
    namespace: demo
roleRef:
  kind: Role
  name: analysis-runner-role
  apiGroup: rbac.authorization.k8s.io

